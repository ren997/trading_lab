<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">威科夫吸筹区间示意图</title>
  <desc id="desc">示意价格从下跌进入交易区间，经历 SC、AR、ST、Spring、SOS 和 LPS 后向上突破。此图用于教学，不代表固定交易模板。</desc>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="40" y="42" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">威科夫吸筹区间示意</text>
  <text x="40" y="72" fill="#475569" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">重点观察：供应是否减弱、需求是否恢复、突破后是否被市场接受</text>

  <line x1="70" y1="125" x2="920" y2="125" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="70" y1="315" x2="920" y2="315" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
  <rect x="70" y="125" width="850" height="190" fill="#e2e8f0" opacity="0.33" stroke="#cbd5e1"/>
  <line x1="360" y1="98" x2="360" y2="468" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 7"/>
  <line x1="560" y1="98" x2="560" y2="468" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 7"/>
  <line x1="675" y1="98" x2="675" y2="468" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 7"/>
  <line x1="815" y1="98" x2="815" y2="468" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 7"/>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#334155">
    <text x="185" y="100">Phase A：止跌</text>
    <text x="405" y="100">Phase B：建因</text>
    <text x="575" y="100">Phase C：测试</text>
    <text x="704" y="100">Phase D：需求占优</text>
    <text x="842" y="100">Phase E：离开区间</text>
  </g>
  <text x="80" y="116" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14">区间上沿 / 阻力</text>
  <text x="80" y="338" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14">区间下沿 / 支撑</text>

  <polyline points="75,150 130,188 190,270 235,330 280,220 335,155 390,245 455,300 520,348 570,287 630,232 690,138 755,195 815,146 895,78"
    fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="75,150 130,188 190,270 235,330" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="690,138 755,195 815,146 895,78" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="235" cy="330" r="8" fill="#ef4444"/>
  <circle cx="335" cy="155" r="8" fill="#0f766e"/>
  <circle cx="455" cy="300" r="8" fill="#0f766e"/>
  <circle cx="520" cy="348" r="8" fill="#f59e0b"/>
  <circle cx="690" cy="138" r="8" fill="#16a34a"/>
  <circle cx="755" cy="195" r="8" fill="#0f766e"/>
  <circle cx="895" cy="78" r="8" fill="#16a34a"/>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700">
    <text x="214" y="360" fill="#b91c1c">SC</text>
    <text x="320" y="142" fill="#0f766e">AR</text>
    <text x="440" y="292" fill="#0f766e">ST</text>
    <text x="488" y="382" fill="#b45309">Spring</text>
    <text x="674" y="122" fill="#15803d">SOS</text>
    <text x="742" y="222" fill="#0f766e">LPS</text>
    <text x="860" y="62" fill="#15803d">突破</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#475569">
    <text x="150" y="390">卖压集中释放</text>
    <text x="376" y="346">低位测试供应</text>
    <text x="514" y="408">假跌破后收回区间</text>
    <text x="623" y="102">需求恢复</text>
    <text x="722" y="250">回踩不深</text>
  </g>

  <g opacity="0.9">
    <rect x="105" y="420" width="30" height="48" fill="#94a3b8"/>
    <rect x="165" y="405" width="30" height="63" fill="#94a3b8"/>
    <rect x="225" y="378" width="30" height="90" fill="#ef4444"/>
    <rect x="285" y="410" width="30" height="58" fill="#94a3b8"/>
    <rect x="345" y="425" width="30" height="43" fill="#94a3b8"/>
    <rect x="405" y="432" width="30" height="36" fill="#94a3b8"/>
    <rect x="465" y="440" width="30" height="28" fill="#94a3b8"/>
    <rect x="525" y="415" width="30" height="53" fill="#f59e0b"/>
    <rect x="585" y="438" width="30" height="30" fill="#94a3b8"/>
    <rect x="645" y="392" width="30" height="76" fill="#16a34a"/>
    <rect x="705" y="432" width="30" height="36" fill="#94a3b8"/>
    <rect x="765" y="404" width="30" height="64" fill="#16a34a"/>
    <rect x="825" y="382" width="30" height="86" fill="#16a34a"/>
  </g>
  <line x1="70" y1="468" x2="920" y2="468" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="492" fill="#64748b" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">成交量示意：SC 常见放量，ST/LPS 常见缩量，SOS/突破需要需求重新出现。真实图表不会完全按此顺序展开。</text>
</svg>
